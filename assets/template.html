<!doctype html>
<html lang="zh-CN" data-mode="editorial" data-accent="indigo-porcelain">
<head>
  <meta charset="utf-8">
  <title>[必填] 替换为知识卡组标题 · Visual Explainer Cards</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;700;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap">
  <style>
    /* =========================================================
       Visual Explainer Cards — Editorial Seed (Indigo Porcelain)
       ---------------------------------------------------------
       Type scale + weights ported from the reference Guizang
       editorial card system. Hard rule: "the larger, the lighter".
       Display sizes use weight 500 (not 700). Body uses serif-zh
       (not sans-zh).

       Board: .poster.xhs  1080×1440  (3:4 小红书)

       Two-layer color logic:
         --accent     IKB Klein Blue   — visible system color on every
                      page (chrome / foot / section-label / em underline
                      / page numbers / body strong / captions).
         --highlight  Mustard Yellow   — cover-bar ONLY (the horizontal
                      bar under .term-en on the series cover).

       This file ships ONE fixed layout: the S00 Series Cover.
       Content pages compose fresh from primitives — see
       references/layouts.md.
       ========================================================= */

    /* ---------- 1. Indigo Porcelain (primary) ---------- */
    :root,
    [data-accent="indigo-porcelain"] {
      --paper: #fafaf8;
      --paper-2: #f0f0ee;
      --ink: #0a0a0a;
      --ink-soft: #1f1f1f;
      --ink-rgb: 10,10,10;
      --paper-rgb: 250,250,248;
      --line: rgba(10,10,10,.16);
      --muted: #6f6f6c;
      --grey-1: #f0f0ee;
      --grey-2: #d4d4d2;
      --grey-3: #737373;
      --accent: #002FA7;       /* IKB Klein Blue */
      --accent-on: #ffffff;
      --accent-rgb: 0,47,167;
      --highlight: #F2D24B;    /* Mustard Yellow — cover bar only */
      --highlight-on: #0a0a0a;
    }

    /* ---------- 2. Alternate accents (single-color, no cover bar) ---------- */
    [data-accent="lemon-yellow"] {
      --paper:#fafaf8;--paper-2:#f0f0ee;--ink:#0a0a0a;--ink-soft:#1f1f1f;
      --ink-rgb:10,10,10;--paper-rgb:250,250,248;--line:rgba(10,10,10,.16);
      --muted:#6f6f6c;--grey-1:#f0f0ee;--grey-2:#d4d4d2;--grey-3:#737373;
      --accent:#FFD500;--accent-on:#0a0a0a;--accent-rgb:255,213,0;
      --highlight:#FFD500;--highlight-on:#0a0a0a;
    }
    [data-accent="lemon-green"] {
      --paper:#fafaf8;--paper-2:#f0f0ee;--ink:#0a0a0a;--ink-soft:#1f1f1f;
      --ink-rgb:10,10,10;--paper-rgb:250,250,248;--line:rgba(10,10,10,.16);
      --muted:#6f6f6c;--grey-1:#f0f0ee;--grey-2:#d4d4d2;--grey-3:#737373;
      --accent:#C5E803;--accent-on:#0a0a0a;--accent-rgb:197,232,3;
      --highlight:#C5E803;--highlight-on:#0a0a0a;
    }
    [data-accent="safety-orange"] {
      --paper:#fafaf8;--paper-2:#f0f0ee;--ink:#0a0a0a;--ink-soft:#1f1f1f;
      --ink-rgb:10,10,10;--paper-rgb:250,250,248;--line:rgba(10,10,10,.16);
      --muted:#6f6f6c;--grey-1:#f0f0ee;--grey-2:#d4d4d2;--grey-3:#737373;
      --accent:#FF6B35;--accent-on:#ffffff;--accent-rgb:255,107,53;
      --highlight:#FF6B35;--highlight-on:#ffffff;
    }

    /* ---------- 3. Typography stack ---------- */
    :root {
      --serif-en: "Playfair Display","Source Serif Pro",Georgia,serif;
      --serif-zh: "Noto Serif SC","Songti SC","STSong",serif;
      --sans:     "Inter","Helvetica Neue",Helvetica,
                  -apple-system,"PingFang SC","Microsoft YaHei UI",sans-serif;
      --sans-zh:  "Noto Sans SC",-apple-system,"PingFang SC","Inter",sans-serif;
      --mono:     "IBM Plex Mono",ui-monospace,"SF Mono",Consolas,monospace;
    }

    /* ---------- 4. Spacing tokens ---------- */
    :root {
      --sp-3:8px;--sp-4:12px;--sp-5:16px;--sp-6:24px;--sp-7:32px;
      --sp-8:40px;--sp-9:48px;--sp-10:64px;--sp-11:80px;--sp-12:96px;
    }

    /* ---------- 5. Reset & sheet ---------- */
    *,*::before,*::after{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{
      background:#1a1a1a;font-family:var(--serif-zh);color:var(--ink);
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
      padding:64px 32px;
    }
    .sheet{display:flex;flex-direction:column;align-items:center;gap:48px;}

    /* ---------- 6. Poster shell ---------- */
    .poster{position:relative;background:var(--paper);color:var(--ink);overflow:hidden;isolation:isolate;}
    .poster.xhs{width:1080px;height:1440px;}
    .poster figure{margin:0;}
    /* Content padding ported from reference: 96px top/bottom, 88px sides */
    .poster.xhs .content{padding:96px 88px;position:relative;width:100%;height:100%;display:flex;flex-direction:column;z-index:2;}

    /* ---------- 7. Typography roles (ported from reference) ----------
       The larger, the lighter. Display weights are 500, not 700.
       Body family is serif-zh, not sans-zh. Tracking on display is
       positive (+.03 to +.04em); kicker/meta tracking is +.20em+.
    ---------------------------------------------------------- */

    /* Display — the biggest serif title, used for cover series title and
       (rarely) for content-page hero titles. Weight 500, +.04em tracking. */
    .h-display{
      font-family:var(--serif-zh);font-weight:500;
      font-size:124px;line-height:1.06;letter-spacing:.04em;
      color:var(--ink);margin:0;
    }
    /* Section title — used on most content pages as the dominant title. */
    .h-xl{
      font-family:var(--serif-zh);font-weight:500;
      font-size:88px;line-height:1.10;letter-spacing:.03em;
      color:var(--ink);margin:0;
    }
    /* Mid title — used for subordinate sections, ledger headers, etc. */
    .h-md{
      font-family:var(--serif-zh);font-weight:500;
      font-size:56px;line-height:1.18;letter-spacing:.02em;
      color:var(--ink);margin:0;
    }
    /* Sub — italic Playfair English subtitle. Goes under display titles. */
    .h-sub{
      font-family:var(--serif-en);font-style:italic;font-weight:400;
      font-size:36px;line-height:1.3;color:var(--muted);margin:0;
    }
    /* Pull quote — italic serif, large. */
    .pullquote{
      font-family:var(--serif-zh);font-style:italic;font-weight:500;
      font-size:64px;line-height:1.28;color:var(--ink);margin:0;
    }
    /* Lead — first paragraph after a title. SERIF, not sans. */
    .lead{
      font-family:var(--serif-zh);font-weight:400;
      font-size:28px;line-height:1.55;color:rgba(var(--ink-rgb),.82);margin:0;
    }
    /* Body — paragraph copy. SERIF, not sans. */
    .body{
      font-family:var(--serif-zh);font-weight:400;
      font-size:24px;line-height:1.65;color:rgba(var(--ink-rgb),.80);margin:0;
    }
    .body strong{color:var(--accent);font-weight:500;}

    /* Em underline emphasis — IKB blue, never yellow on content pages. */
    .h-display em,.h-xl em,.h-md em{
      font-style:normal;color:var(--ink);
      text-decoration:underline;
      text-decoration-color:var(--accent);
      text-decoration-thickness:6px;
      text-underline-offset:10px;
    }
    .h-md em{text-decoration-thickness:5px;text-underline-offset:8px;}

    /* Kicker — mono uppercase, +.22em tracking. NOT yellow. */
    .kicker{
      font-family:var(--mono);font-weight:500;
      font-size:21px;letter-spacing:.22em;text-transform:uppercase;
      color:rgba(var(--ink-rgb),.55);margin:0;
    }
    /* Meta / label — even tighter, +.20em. */
    .meta,.label{
      font-family:var(--mono);font-weight:500;
      font-size:18px;letter-spacing:.20em;text-transform:uppercase;
      color:rgba(var(--ink-rgb),.55);
    }

    /* ---------- 8. Section label (IKB tag, replaces yellow kicker) ---------- */
    /* IKB blue square + IKB mono uppercase. Use one per content page so
       the system color is visible. */
    .section-label{
      display:inline-flex;align-items:center;gap:12px;
      font-family:var(--mono);font-weight:500;
      font-size:21px;letter-spacing:.22em;text-transform:uppercase;
      color:var(--accent);margin:0;
    }
    .section-label::before{
      content:"";display:inline-block;width:14px;height:14px;background:var(--accent);
    }

    /* ---------- 9. Issue row + footer (IKB visible) ---------- */
    .issue-row{
      display:flex;align-items:center;gap:16px;
      font-family:var(--mono);font-weight:500;
      font-size:20px;letter-spacing:.20em;text-transform:uppercase;
      color:var(--muted);
    }
    .issue-row .dot{
      width:8px;height:8px;border-radius:50%;background:var(--accent);
    }
    .chrome{
      display:flex;justify-content:space-between;align-items:center;
      font-family:var(--mono);font-weight:500;
      font-size:18px;letter-spacing:.20em;text-transform:uppercase;
      padding-bottom:18px;border-bottom:1px solid var(--accent);
      margin-bottom:48px;
    }
    .chrome .c-cat{color:var(--accent);}
    .chrome .c-num{color:var(--muted);}

    .foot{
      display:flex;justify-content:space-between;align-items:center;
      font-family:var(--mono);font-weight:500;
      font-size:18px;letter-spacing:.20em;text-transform:uppercase;
      margin-top:auto;padding-top:32px;
      border-top:1px solid var(--accent);
    }
    .foot .f-tag{color:var(--muted);}
    .foot .f-num{color:var(--accent);}

    .grow{flex:1;}
    .hr-hairline{height:1px;background:var(--line);border:0;margin:0;}
    .hr-accent{height:2px;background:var(--accent);border:0;width:96px;margin:0;}

    /* ---------- 10. Image containers ---------- */
    .illust-frame{
      width:100%;background:var(--paper);
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;margin:0;
    }
    .illust-frame img{width:100%;height:100%;object-fit:contain;display:block;}
    .frame-img{position:relative;overflow:hidden;background:var(--paper-2);}
    .frame-img img{width:100%;height:100%;object-fit:cover;display:block;}
    .img-cap{
      font-family:var(--mono);font-weight:500;
      font-size:18px;letter-spacing:.20em;text-transform:uppercase;
      color:var(--accent);margin-top:14px;
    }

    /* ---------- 11. S00 — Series Cover (the ONE fixed layout) ---------- */
    /* Cover composition (top to bottom):
         .chrome             — IKB hairline + IKB category + day no.
         .section-label      — small IKB tag with square
         .series-zh          — large serif series title (uses .h-display 124px)
         hr-hairline         — quiet divider
         .term-en            — huge serif English term (240px) with yellow bar
         .term-zh            — italic Playfair English sub (.h-sub) — IKB recolor
         .term-question      — serif Chinese question (.h-md size)
         .grow               — pushes foot down
         .foot               — IKB hairline + tag + day no.
       This is the ONLY page in the system that uses the mustard yellow bar.
    */
    .cover-series .series-zh{
      font-family:var(--serif-zh);font-weight:500;
      font-size:124px;line-height:1.06;letter-spacing:.04em;
      color:var(--ink);margin:0;
    }
    .cover-series .series-zh .ai-accent{
      color:var(--accent);font-family:var(--serif-en);
      font-style:italic;font-weight:700;
    }
    .cover-series .term-en{
      position:relative;display:inline-block;
      font-family:var(--serif-en);font-weight:900;
      font-size:240px;line-height:1;letter-spacing:-.02em;
      color:var(--ink);margin:0;
    }
    .cover-series .term-en::before{
      content:"";position:absolute;left:-8px;right:-8px;bottom:14px;
      height:56px;background:var(--highlight);z-index:-1;  /* ← yellow bar (cover only) */
    }
    .cover-series .term-zh{
      font-family:var(--serif-en);font-style:italic;font-weight:400;
      font-size:36px;line-height:1.3;color:var(--accent);margin:0;
    }
    .cover-series .term-question{
      font-family:var(--serif-zh);font-weight:500;
      font-size:56px;line-height:1.18;letter-spacing:.02em;
      color:var(--ink);margin:0;max-width:880px;
    }
  </style>
</head>
<body>
  <main class="sheet">

    <!-- =====================================================
         HOW TO USE THIS SEED

         1. The cover (S00) below is the ONE fixed layout. Replace the
            placeholders verbatim — do NOT redesign its structure.

         2. For content pages, do NOT copy the cover structure. Read
            references/layouts.md for design principles, then compose
            each page fresh from these primitives:
              - .poster.xhs / .content                board + flex column
              - .chrome / .foot                       top/bottom IKB hairlines
              - .section-label                        per-page IKB section tag
              - .h-display (124) / .h-xl (88) /
                .h-md (56) / .h-sub (36 italic en) /
                .pullquote (64 italic) /
                .lead (28 serif) / .body (24 serif) /
                .kicker (21 mono) / .meta (18 mono)
              - em inside any heading                 → IKB underline
              - .illust-frame                         AI-generated illustration
              - .frame-img                            photo evidence
              - .hr-accent (IKB) / .hr-hairline (grey)
              - .img-cap                              IKB mono caption

         3. Color rules (HARD):
              - IKB blue MUST be visible on every page (chrome / foot /
                section-label / em underline / page numbers).
              - Mustard yellow appears EXACTLY ONCE per set: the cover bar.

         4. Type rules (HARD):
              - The larger, the lighter. Display weights are 500, never 700+.
              - Body and lead are SERIF (serif-zh), never sans.
              - Tracking on display titles is positive (+.03 to +.04em).
              - Kicker / meta tracking is +.20em or more.

         5. Illustration rule (HARD):
              - Most content pages should pair text + small illustration.
              - .illust-frame heights: 480-560 (concept-led), 160-260 (list
                thumb), 100-160 (inline step). Never one giant centerpiece.
     ===================================================== -->

    <!-- ============================================================
         S00 Series Cover — fixed layout (replace placeholders only)
         ============================================================ -->
    <section class="poster xhs cover-series" id="xhs-01-cover">
      <div class="content" style="gap:40px;">
        <div class="chrome">
          <span class="c-cat">AI Knowledge · Beginner Series</span>
          <span class="c-num">Day 0X</span>
        </div>
        <p class="section-label">Indigo Porcelain</p>
        <h1 class="series-zh">每天吃透一个<br><span class="ai-accent">AI</span> 知识点</h1>
        <hr class="hr-hairline">
        <div style="display:flex;flex-direction:column;gap:18px;">
          <p class="term-en">TERM</p>
          <p class="term-zh">A working subtitle in English</p>
        </div>
        <p class="term-question">一个具体的用户场景问题,引出本日主题。</p>
        <div class="grow"></div>
        <div class="foot">
          <span class="f-tag">TERM · 一句标语</span>
          <span class="f-num">AI Native · 00X</span>
        </div>
      </div>
    </section>

    <!--
    ============================================================
    CONTENT PAGE SNIPPETS — reference patterns to compose from
    ------------------------------------------------------------
    These are NOT five fixed slots. They are six common content
    shapes, each shown as a complete working block. Use them as
    starting copy-paste, then adjust to your actual content:
    rename the section-label, change the title, swap the
    illustration role, add/remove rows. You may use only the
    ones you need, in any order, and you may invent variants —
    but every content page should:
      • have a .chrome top bar
      • have a .section-label (IKB tag) explaining the page's role
      • have a hero-weight headline (.h-xl or .h-display)
      • PAIR text with at least one .illust-frame unless the page
        is intentionally a pure-text pull-quote
      • close with a .foot bottom bar
    Delete this whole comment block before shipping.
    ============================================================
    -->

    <!--
    ============================================================
    P-METAPHOR — concept + large illustration (the workhorse)
    Use when: page introduces a metaphor / mental model / "X is
    like Y" framing. Illustration carries most of the explanation.
    Illust height: 540px. Caption is IKB mono.
    ------------------------------------------------------------
    <section class="poster xhs" id="xhs-02-metaphor">
      <div class="content" style="gap:32px;">
        <div class="chrome">
          <span class="c-cat">核心比喻 · METAPHOR</span>
          <span class="c-num">02 / 05</span>
        </div>
        <p class="section-label">打个比方</p>
        <h2 class="h-xl">主题像 <em>类比对象</em></h2>
        <figure class="illust-frame" style="height:540px;">
          <img src="assets/page-02.png" alt="一句话描述插图要展示的核心结构">
        </figure>
        <p class="img-cap">Fig. 01 · 一句插图说明</p>
        <p class="body">用 2-3 句话把这个类比落回真实场景:<strong>关键概念 1</strong>(对应什么)、<strong>关键概念 2</strong>(对应什么)、<strong>关键概念 3</strong>(对应什么)。</p>
        <div class="foot">
          <span class="f-tag">一句标语收尾</span>
          <span class="f-num">02 / 05</span>
        </div>
      </div>
    </section>
    ============================================================
    -->

    <!--
    ============================================================
    P-LIST — numbered list with inline thumb illustrations
    Use when: page is "3-4 typical symptoms / steps / signals".
    Each row gets a SMALL illustration (200×200) on the left.
    The illustration plus number plus copy is the row unit.
    ------------------------------------------------------------
    <section class="poster xhs" id="xhs-03-list">
      <div class="content" style="gap:28px;">
        <div class="chrome">
          <span class="c-cat">为什么重要 · WHY</span>
          <span class="c-num">03 / 05</span>
        </div>
        <p class="section-label">典型症状</p>
        <h2 class="h-xl">Demo 漂亮<br><em>上生产翻车</em></h2>
        <div class="list-rows" style="display:flex;flex-direction:column;gap:24px;flex:1;">
          <div class="list-row" style="display:grid;grid-template-columns:200px 1fr;gap:32px;align-items:center;padding-bottom:24px;border-bottom:1px solid var(--line);">
            <figure class="illust-frame" style="height:200px;">
              <img src="assets/symptom-01.png" alt="症状 1 的小插图">
            </figure>
            <div>
              <p class="meta" style="color:var(--accent);margin:0 0 8px;">01</p>
              <p class="body" style="margin:0;"><strong>症状一标题</strong> · 一行展开,说清楚发生了什么。</p>
            </div>
          </div>
          <div class="list-row" style="display:grid;grid-template-columns:200px 1fr;gap:32px;align-items:center;padding-bottom:24px;border-bottom:1px solid var(--line);">
            <figure class="illust-frame" style="height:200px;">
              <img src="assets/symptom-02.png" alt="症状 2 的小插图">
            </figure>
            <div>
              <p class="meta" style="color:var(--accent);margin:0 0 8px;">02</p>
              <p class="body" style="margin:0;"><strong>症状二标题</strong> · 一行展开。</p>
            </div>
          </div>
          <div class="list-row" style="display:grid;grid-template-columns:200px 1fr;gap:32px;align-items:center;">
            <figure class="illust-frame" style="height:200px;">
              <img src="assets/symptom-03.png" alt="症状 3 的小插图">
            </figure>
            <div>
              <p class="meta" style="color:var(--accent);margin:0 0 8px;">03</p>
              <p class="body" style="margin:0;"><strong>症状三标题</strong> · 一行展开。</p>
            </div>
          </div>
        </div>
        <div class="foot">
          <span class="f-tag">一句标语收尾</span>
          <span class="f-num">03 / 05</span>
        </div>
      </div>
    </section>
    ============================================================
    -->

    <!--
    ============================================================
    P-COMPARE — Before / After side-by-side with two illustrations
    Use when: page contrasts two states ("以前 → 现在", "错 → 对",
    "Demo → 生产"). Each column gets its own small illustration to
    visualize the state, plus 3 short bullets.
    ------------------------------------------------------------
    <section class="poster xhs" id="xhs-04-compare">
      <div class="content" style="gap:28px;">
        <div class="chrome">
          <span class="c-cat">真实案例 · CASE</span>
          <span class="c-num">04 / 05</span>
        </div>
        <p class="section-label">某电商 AI 客服</p>
        <h2 class="h-xl">从写死<br>到 <em>可管控</em></h2>
        <div class="compare" style="display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1;">
          <div class="compare-col" style="display:flex;flex-direction:column;gap:18px;">
            <p class="meta">Before · 上线初期</p>
            <figure class="illust-frame" style="height:240px;">
              <img src="assets/before.png" alt="before 状态的示意插图">
            </figure>
            <p class="body" style="margin:0;"><strong>硬编码 prompt</strong></p>
            <ul class="body" style="margin:0;padding-left:1.1em;line-height:1.55;">
              <li>回复质量忽高忽低</li>
              <li>改 prompt 要重新发版</li>
              <li>没有质量监控</li>
            </ul>
          </div>
          <div class="compare-col" style="display:flex;flex-direction:column;gap:18px;">
            <p class="meta" style="color:var(--accent);">After · 引入方案</p>
            <figure class="illust-frame" style="height:240px;">
              <img src="assets/after.png" alt="after 状态的示意插图">
            </figure>
            <p class="body" style="margin:0;"><strong>可配置 + 可监控</strong></p>
            <ul class="body" style="margin:0;padding-left:1.1em;line-height:1.55;">
              <li>prompt 可视化管理</li>
              <li>每次输出有质量评分</li>
              <li>低分自动触发人工审核</li>
            </ul>
          </div>
        </div>
        <div class="foot">
          <span class="f-tag">一句标语收尾</span>
          <span class="f-num">04 / 05</span>
        </div>
      </div>
    </section>
    ============================================================
    -->

    <!--
    ============================================================
    P-MECHANISM — vertical pipeline with inline step icons
    Use when: page explains a sequence of steps / a process / a
