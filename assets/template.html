<!doctype html>
<html lang="zh-CN" data-mode="editorial" data-accent="indigo-porcelain">
<head>
  <meta charset="utf-8">
  <title>[必填] 替换为知识卡组标题 · Visual Explainer Cards</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+SC:wght@200;300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;700;900&family=Playfair+Display:wght@700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
  <style>
    /* =========================================================
       Visual Explainer Cards — Editorial Seed (Indigo Porcelain)
       ---------------------------------------------------------
       Single board: .poster.xhs  1080×1440  (3:4  小红书)

       Color system:
         --accent     IKB Klein Blue  — system structure color
         --highlight  Mustard Yellow  — used ONLY for emphasis
                                         (em / kicker / num blocks
                                          / hr-accent / cover bar)

       Typography:
         --serif-en   Playfair Display  — English display titles
         --serif-zh   Noto Serif SC     — Chinese display titles
         --sans-zh    Noto Sans SC      — body / caption
         --mono       IBM Plex Mono     — meta / chrome

       Layouts:
         S00 Series Cover           — Day NN series cover
         S01 Concept + Image plate  — metaphor / illustration
         S02 Tall Ledger            — numbered list (3 items)
         S03 Before / After         — split comparison
         S04 Closing                — A/B/C options

       Switch accent via <html data-accent="…">:
         indigo-porcelain (default) | lemon-yellow | lemon-green | safety-orange
       ========================================================= */

    /* ---------- 1. Indigo Porcelain (primary, dual-color) ---------- */
    :root,
    [data-accent="indigo-porcelain"] {
      --paper: #fafaf8;
      --paper-deep: #f0f0ee;
      --ink: #0a0a0a;
      --ink-soft: #1f1f1f;
      --grey-1: #f0f0ee;
      --grey-2: #d4d4d2;
      --grey-3: #737373;
      --accent: #002FA7;       /* IKB Klein Blue — system structure */
      --accent-on: #ffffff;
      --highlight: #F2D24B;    /* Mustard Yellow — emphasis only */
      --highlight-on: #0a0a0a;
    }
    /* ---------- 2. Alternate accents (single-color, no highlight) ---------- */
    [data-accent="lemon-yellow"] {
      --paper: #fafaf8; --paper-deep:#f0f0ee;
      --ink:#0a0a0a; --ink-soft:#1f1f1f;
      --grey-1:#f0f0ee; --grey-2:#d4d4d2; --grey-3:#737373;
      --accent:#FFD500; --accent-on:#0a0a0a;
      --highlight:#FFD500; --highlight-on:#0a0a0a;
    }
    [data-accent="lemon-green"] {
      --paper:#fafaf8; --paper-deep:#f0f0ee;
      --ink:#0a0a0a; --ink-soft:#1f1f1f;
      --grey-1:#f0f0ee; --grey-2:#d4d4d2; --grey-3:#737373;
      --accent:#C5E803; --accent-on:#0a0a0a;
      --highlight:#C5E803; --highlight-on:#0a0a0a;
    }
    [data-accent="safety-orange"] {
      --paper:#fafaf8; --paper-deep:#f0f0ee;
      --ink:#0a0a0a; --ink-soft:#1f1f1f;
      --grey-1:#f0f0ee; --grey-2:#d4d4d2; --grey-3:#737373;
      --accent:#FF6B35; --accent-on:#ffffff;
      --highlight:#FF6B35; --highlight-on:#ffffff;
    }

    /* ---------- 3. Typography stack ---------- */
    :root {
      --serif-en: "Playfair Display","Source Serif Pro",Georgia,serif;
      --serif-zh: "Noto Serif SC","Source Han Serif SC","Songti SC",serif;
      --sans:     "Inter","Helvetica Neue",Helvetica,"Noto Sans SC",
                  -apple-system,"PingFang SC","Microsoft YaHei UI",sans-serif;
      --sans-zh:  "Noto Sans SC",-apple-system,"PingFang SC","Inter",sans-serif;
      --mono:     "IBM Plex Mono",ui-monospace,"SF Mono",Consolas,monospace;
    }

    /* ---------- 4. Spacing tokens ---------- */
    :root {
      --sp-3:8px;--sp-4:12px;--sp-5:16px;--sp-6:24px;--sp-7:32px;
      --sp-8:40px;--sp-9:48px;--sp-10:64px;--sp-11:80px;--sp-12:96px;
    }

    /* ---------- 5. Reset & sheet ---------- */
    *,*::before,*::after{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{
      background:#1a1a1a;font-family:var(--sans);color:var(--ink);
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
      padding:64px 32px;
    }
    .sheet{display:flex;flex-direction:column;align-items:center;gap:48px;}

    /* ---------- 6. Poster shell ---------- */
    .poster{position:relative;background:var(--paper);color:var(--ink);overflow:hidden;isolation:isolate;}
    .poster.xhs{width:1080px;height:1440px;}
    .poster figure{margin:0;}
    .poster.xhs .content{padding:80px;position:relative;width:100%;height:100%;display:flex;flex-direction:column;}

    /* ---------- 7. Chrome + foot ---------- */
    .chrome{
      display:flex;justify-content:space-between;align-items:center;
      font-family:var(--mono);font-size:18px;letter-spacing:.14em;text-transform:uppercase;
      color:var(--grey-3);
      padding-bottom:18px;border-bottom:1px solid var(--grey-2);
      margin-bottom:var(--sp-9);
    }
    .foot{
      display:flex;justify-content:space-between;align-items:center;
      font-family:var(--mono);font-size:18px;letter-spacing:.06em;
      color:var(--grey-3);
      margin-top:auto;padding-top:var(--sp-7);
      border-top:1px solid var(--grey-2);
    }
    .grow{flex:1;}
    .hr-hairline{height:1px;background:var(--grey-2);border:0;margin:0;}
    .hr-accent{height:3px;background:var(--highlight);border:0;width:96px;margin:0;}

    /* ---------- 8. Editorial typography (display) ---------- */

    /* Kicker — yellow highlight block, mono uppercase */
    .kicker{
      font-family:var(--mono);font-weight:500;
      font-size:20px;letter-spacing:.16em;text-transform:uppercase;
      color:var(--highlight-on);background:var(--highlight);
      padding:6px 14px;display:inline-block;margin:0;
    }
    .kicker-plain{
      font-family:var(--mono);font-weight:500;
      font-size:20px;letter-spacing:.16em;text-transform:uppercase;
      color:var(--grey-3);margin:0;
    }

    /* Display title — large serif Chinese with yellow em emphasis */
    .h-display-zh{
      font-family:var(--serif-zh);font-weight:700;
      font-size:96px;line-height:1.22;letter-spacing:-.01em;
      color:var(--ink);margin:0;
    }
    .h-display-zh em{
      font-style:normal;color:var(--highlight-on);background:var(--highlight);
      padding:0 12px;
      box-decoration-break:clone;-webkit-box-decoration-break:clone;
    }

    /* Section title — medium serif */
    .h-section-zh{
      font-family:var(--serif-zh);font-weight:700;
      font-size:64px;line-height:1.25;
      color:var(--ink);margin:0;
    }
    .h-section-zh em{
      font-style:normal;color:var(--ink);
      text-decoration:underline;
      text-decoration-color:var(--highlight);
      text-decoration-thickness:6px;
      text-underline-offset:8px;
    }

    /* Body / lead — sans-zh */
    .lead{font-family:var(--sans-zh);font-weight:400;font-size:30px;line-height:1.6;color:var(--ink-soft);margin:0;}
    .body{font-family:var(--sans-zh);font-weight:400;font-size:26px;line-height:1.65;color:var(--ink-soft);margin:0;}
    .body strong{color:var(--ink);font-weight:600;}

    /* ---------- 9. S00 — Series Cover ---------- */
    .cover-series .series-zh{
      font-family:var(--serif-zh);font-weight:700;
      font-size:84px;line-height:1.18;color:var(--ink);margin:0;
    }
    .cover-series .series-zh .ai-accent{
      color:var(--ink);font-family:var(--serif-en);font-weight:900;
    }
    .cover-series .term-en{
      position:relative;display:inline-block;
      font-family:var(--serif-en);font-weight:900;
      font-size:240px;line-height:1;letter-spacing:-.025em;
      color:var(--ink);margin:0;
    }
    .cover-series .term-en::before{
      content:"";position:absolute;left:-8px;right:-8px;bottom:14px;
      height:52px;background:var(--highlight);z-index:-1;
    }
    .cover-series .term-zh{
      font-family:var(--sans-zh);font-weight:600;font-size:32px;
      color:var(--grey-3);letter-spacing:.02em;margin:0;
    }
    .cover-series .term-question{
      font-family:var(--serif-zh);font-weight:500;font-size:44px;line-height:1.45;
      color:var(--ink);margin:0;max-width:880px;
    }

    /* ---------- 10. S01 — Concept + Image plate ---------- */
    .concept-page .plate{
      background:var(--paper);
      padding:0;
      border:1px solid var(--grey-2);
    }
    .concept-page .illust-frame{
      width:100%;height:560px;background:var(--paper);
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;margin:0;
    }
    .concept-page .illust-frame img{width:100%;height:100%;object-fit:contain;display:block;}
    .concept-page .plate-caption{
      font-family:var(--mono);font-size:18px;letter-spacing:.14em;
      text-transform:uppercase;color:var(--grey-3);
      margin:20px 0 0;text-align:center;
    }
    .concept-page .caption{
      font-family:var(--sans-zh);font-weight:500;font-size:26px;
      line-height:1.55;color:var(--ink-soft);margin:0;
    }
    .concept-page .caption strong{color:var(--ink);font-weight:600;}

    /* ---------- 11. S02 — Tall Ledger (numbered list) ---------- */
    .ledger{display:flex;flex-direction:column;}
    .ledger .row{
      display:grid;grid-template-columns:160px 1fr;gap:32px;
      align-items:baseline;padding:28px 0;
      border-bottom:1px solid var(--grey-2);
    }
    .ledger .row:first-child{padding-top:0;}
    .ledger .row:last-child{border-bottom:0;}
    .ledger .num{
      font-family:var(--serif-en);font-weight:900;
      font-size:104px;line-height:1;
      color:var(--highlight-on);background:var(--highlight);
      padding:0 20px;display:inline-block;margin:0;justify-self:start;
    }
    .ledger .row-text{
      font-family:var(--serif-zh);font-weight:700;
      font-size:34px;line-height:1.3;color:var(--ink);margin:0;
    }
    .ledger .row-text .sub{
      display:block;font-family:var(--sans-zh);font-weight:400;
      font-size:22px;color:var(--grey-3);margin-top:8px;
    }

    /* ---------- 12. S03 — Before / After ---------- */
    .ba{display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1;}
    .ba-card{padding:36px;display:flex;flex-direction:column;gap:20px;}
    .ba-before{background:var(--paper-deep);border:1px solid var(--grey-2);}
    .ba-after{background:var(--ink);color:var(--paper);}
    .ba-after .ba-tag,.ba-after .ba-h,.ba-after li{color:var(--paper);}
    .ba-tag{
      font-family:var(--mono);font-size:18px;letter-spacing:.14em;
      text-transform:uppercase;color:var(--grey-3);margin:0;
    }
    .ba-h{
      font-family:var(--serif-zh);font-weight:700;
      font-size:42px;line-height:1.25;color:var(--ink);margin:0;
    }
    .ba-after .ba-h em{
      font-style:normal;color:var(--highlight-on);background:var(--highlight);
      padding:0 8px;
      box-decoration-break:clone;-webkit-box-decoration-break:clone;
    }
    .ba ul{
      font-family:var(--sans-zh);font-size:22px;line-height:1.55;
      margin:0;padding-left:1.1em;color:var(--ink-soft);
    }
    .ba-after ul{color:var(--paper);}

    /* ---------- 13. S04 — Closing (A/B/C options) ---------- */
    .closing .options{display:flex;flex-direction:column;gap:18px;}
    .closing .opt{
      display:grid;grid-template-columns:80px 1fr;gap:24px;
      align-items:baseline;padding:18px 0;border-bottom:1px solid var(--grey-2);
    }
    .closing .opt:last-child{border-bottom:0;}
    .closing .opt .letter{
      font-family:var(--serif-en);font-weight:900;
      font-size:64px;line-height:1;color:var(--ink);margin:0;
    }
    .closing .opt.is-key .letter{
      color:var(--highlight-on);background:var(--highlight);
      padding:0 16px;justify-self:start;
    }
    .closing .opt .opt-text{
      font-family:var(--serif-zh);font-weight:700;
      font-size:30px;line-height:1.3;color:var(--ink);margin:0;
    }
    .closing .opt .opt-text .sub{
      display:block;font-family:var(--sans-zh);font-weight:400;
      font-size:20px;color:var(--grey-3);margin-top:4px;
    }
  </style>
</head>
<body>
  <main class="sheet">

    <!-- =====================================================
         POSTERS_HERE — replace placeholder below with real pages.
         Use one layout (S00-S04) per poster. See references/layouts.md.

         Hard rules every poster must honor:
           - exactly one --accent in the entire set
           - --highlight (mustard) only for emphasis: kicker, em,
             ledger numbers, hr-accent, cover bar, key option
           - no border-radius, no box-shadow, no gradients
           - serif for display titles, sans for body
           - content density ≥ 75% of canvas height
     ===================================================== -->

    <!-- ============================================================
         Placeholder: S00 Series Cover  (replace with real content)
         ============================================================ -->
    <section class="poster xhs cover-series" id="xhs-01-cover">
      <div class="content" style="gap:36px;">
        <div class="chrome">
          <span>AI Knowledge · Beginner Series</span>
          <span>Day 0X</span>
        </div>
        <p class="kicker-plain" style="color:var(--ink);">Indigo Porcelain</p>
        <h1 class="series-zh">每天吃透一个<br><span class="ai-accent">AI</span> 知识点</h1>
        <hr class="hr-hairline">
        <div style="display:flex;flex-direction:column;gap:24px;">
          <p class="term-en">TERM</p>
          <p class="term-zh">中文小标题</p>
        </div>
        <p class="term-question">一个具体的用户场景问题,引出本日主题。</p>
        <div class="grow"></div>
        <div class="foot">
          <span>TERM · 一句标语</span>
          <span>AI Native · 00X</span>
        </div>
      </div>
    </section>

  </main>
</body>
</html>
