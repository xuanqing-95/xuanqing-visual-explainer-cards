<!doctype html>
<html lang="zh-CN" data-mode="editorial" data-accent="indigo-porcelain">
<head>
  <meta charset="utf-8">
  <title>[必填] 替换为知识卡组标题 · Visual Explainer Cards</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+SC:wght@200;300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;700;900&family=Playfair+Display:wght@700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
  <style>
    /* =========================================================
       Visual Explainer Cards — Editorial Seed (Indigo Porcelain)
       ---------------------------------------------------------
       Single board: .poster.xhs  1080×1440  (3:4 小红书)

       THIS FILE IS A SEED, NOT A LAYOUT LIBRARY.
       It provides:
         - color tokens (Indigo Porcelain + 3 alt single-color)
         - typography stack (serif display + sans body + mono meta)
         - poster shell + chrome + foot
         - one finished layout: S00 Series Cover
       It deliberately does NOT ship fixed recipes for content pages
       (concept / ledger / before-after / closing). Design each content
       page fresh based on the content shape, using the principles in
       references/layouts.md.

       Two-layer color logic:
         --accent     IKB Klein Blue  — the visible system color.
                      MUST appear on chrome, hairlines, page numbers,
                      section labels, dividers, structural marks across
                      every page. If you don't see IKB blue when you
                      look at a finished page, you've used the system
                      wrong.
         --highlight  Mustard Yellow  — reserved for the cover horizontal
                      bar under .term-en ONLY. Do NOT use it on content
                      pages. Do NOT use it for em fills, kickers, list
                      numbers, key options. One use per card set.
       ========================================================= */

    /* ---------- 1. Indigo Porcelain (primary) ---------- */
    :root,
    [data-accent="indigo-porcelain"] {
      --paper: #fafaf8;
      --paper-deep: #f0f0ee;
      --ink: #0a0a0a;
      --ink-soft: #1f1f1f;
      --grey-1: #f0f0ee;
      --grey-2: #d4d4d2;
      --grey-3: #737373;
      --accent: #002FA7;       /* IKB Klein Blue — system structure, visible everywhere */
      --accent-on: #ffffff;
      --highlight: #F2D24B;    /* Mustard Yellow — COVER BAR ONLY */
      --highlight-on: #0a0a0a;
    }
    /* ---------- 2. Alternate accents (single-color, no cover bar) ---------- */
    [data-accent="lemon-yellow"] {
      --paper:#fafaf8; --paper-deep:#f0f0ee;
      --ink:#0a0a0a; --ink-soft:#1f1f1f;
      --grey-1:#f0f0ee; --grey-2:#d4d4d2; --grey-3:#737373;
      --accent:#FFD500; --accent-on:#0a0a0a;
      --highlight:#FFD500; --highlight-on:#0a0a0a;
    }
    [data-accent="lemon-green"] {
      --paper:#fafaf8; --paper-deep:#f0f0ee;
      --ink:#0a0a0a; --ink-soft:#1f1f1f;
      --grey-1:#f0f0ee; --grey-2:#d4d4d2; --grey-3:#737373;
      --accent:#C5E803; --accent-on:#0a0a0a;
      --highlight:#C5E803; --highlight-on:#0a0a0a;
    }
    [data-accent="safety-orange"] {
      --paper:#fafaf8; --paper-deep:#f0f0ee;
      --ink:#0a0a0a; --ink-soft:#1f1f1f;
      --grey-1:#f0f0ee; --grey-2:#d4d4d2; --grey-3:#737373;
      --accent:#FF6B35; --accent-on:#ffffff;
      --highlight:#FF6B35; --highlight-on:#ffffff;
    }

    /* ---------- 3. Typography stack ---------- */
    :root {
      --serif-en: "Playfair Display","Source Serif Pro",Georgia,serif;
      --serif-zh: "Noto Serif SC","Source Han Serif SC","Songti SC",serif;
      --sans:     "Inter","Helvetica Neue",Helvetica,"Noto Sans SC",
                  -apple-system,"PingFang SC","Microsoft YaHei UI",sans-serif;
      --sans-zh:  "Noto Sans SC",-apple-system,"PingFang SC","Inter",sans-serif;
      --mono:     "IBM Plex Mono",ui-monospace,"SF Mono",Consolas,monospace;
    }

    /* ---------- 4. Spacing tokens ---------- */
    :root {
      --sp-3:8px;--sp-4:12px;--sp-5:16px;--sp-6:24px;--sp-7:32px;
      --sp-8:40px;--sp-9:48px;--sp-10:64px;--sp-11:80px;--sp-12:96px;
    }

    /* ---------- 5. Reset & sheet ---------- */
    *,*::before,*::after{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{
      background:#1a1a1a;font-family:var(--sans);color:var(--ink);
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
      padding:64px 32px;
    }
    .sheet{display:flex;flex-direction:column;align-items:center;gap:48px;}

    /* ---------- 6. Poster shell ---------- */
    .poster{position:relative;background:var(--paper);color:var(--ink);overflow:hidden;isolation:isolate;}
    .poster.xhs{width:1080px;height:1440px;}
    .poster figure{margin:0;}
    .poster.xhs .content{padding:80px;position:relative;width:100%;height:100%;display:flex;flex-direction:column;}

    /* ---------- 7. Chrome + foot (IKB blue is visible here) ---------- */
    /* Chrome: top metadata row. IKB blue on the left category label
       makes the system color visible on every page. */
    .chrome{
      display:flex;justify-content:space-between;align-items:baseline;
      font-family:var(--mono);font-size:18px;letter-spacing:.14em;text-transform:uppercase;
      padding-bottom:18px;border-bottom:1px solid var(--accent);  /* IKB hairline */
      margin-bottom:var(--sp-9);
    }
    .chrome .c-cat{color:var(--accent);font-weight:600;}          /* IKB label */
    .chrome .c-num{color:var(--grey-3);}

    .foot{
      display:flex;justify-content:space-between;align-items:baseline;
      font-family:var(--mono);font-size:18px;letter-spacing:.06em;
      margin-top:auto;padding-top:var(--sp-7);
      border-top:1px solid var(--accent);                          /* IKB hairline */
    }
    .foot .f-tag{color:var(--grey-3);}
    .foot .f-num{color:var(--accent);font-weight:600;}             /* IKB page number */

    .grow{flex:1;}
    .hr-hairline{height:1px;background:var(--grey-2);border:0;margin:0;}
    .hr-accent{height:3px;background:var(--accent);border:0;width:96px;margin:0;}  /* IKB, not yellow */

    /* ---------- 8. Section label (IKB blue, used per content page) ---------- */
    /* Use this in place of yellow kickers. It states "what kind of page
       this is" in IKB blue mono, with a small IKB square mark. */
    .section-label{
      display:inline-flex;align-items:center;gap:10px;
      font-family:var(--mono);font-weight:600;
      font-size:20px;letter-spacing:.16em;text-transform:uppercase;
      color:var(--accent);margin:0;
    }
    .section-label::before{
      content:"";display:inline-block;width:14px;height:14px;background:var(--accent);
    }

    /* ---------- 9. Editorial display titles (no yellow on content pages) ---------- */
    /* Display title — large serif Chinese.
       For emphasis on content pages, use IKB underline (NOT yellow fill). */
    .h-display-zh{
      font-family:var(--serif-zh);font-weight:700;
      font-size:96px;line-height:1.22;letter-spacing:-.01em;
      color:var(--ink);margin:0;
    }
    .h-display-zh em{
      font-style:normal;color:var(--ink);
      text-decoration:underline;
      text-decoration-color:var(--accent);
      text-decoration-thickness:6px;
      text-underline-offset:10px;
    }

    .h-section-zh{
      font-family:var(--serif-zh);font-weight:700;
      font-size:64px;line-height:1.25;
      color:var(--ink);margin:0;
    }
    .h-section-zh em{
      font-style:normal;color:var(--ink);
      text-decoration:underline;
      text-decoration-color:var(--accent);
      text-decoration-thickness:5px;
      text-underline-offset:8px;
    }

    /* Body / lead — sans-zh */
    .lead{font-family:var(--sans-zh);font-weight:400;font-size:30px;line-height:1.6;color:var(--ink-soft);margin:0;}
    .body{font-family:var(--sans-zh);font-weight:400;font-size:26px;line-height:1.65;color:var(--ink-soft);margin:0;}
    .body strong{color:var(--accent);font-weight:600;}             /* IKB inline emphasis */

    /* ---------- 10. S00 — Series Cover (the ONE fixed layout) ---------- */
    /* The cover is the only page with mustard yellow. It carries the
       horizontal bar under .term-en. Content pages do not use this color. */
    .cover-series .series-zh{
      font-family:var(--serif-zh);font-weight:700;
      font-size:84px;line-height:1.18;color:var(--ink);margin:0;
    }
    .cover-series .series-zh .ai-accent{
      color:var(--accent);font-family:var(--serif-en);font-weight:900;
    }
    .cover-series .term-en{
      position:relative;display:inline-block;
      font-family:var(--serif-en);font-weight:900;
      font-size:240px;line-height:1;letter-spacing:-.025em;
      color:var(--ink);margin:0;
    }
    .cover-series .term-en::before{
      content:"";position:absolute;left:-8px;right:-8px;bottom:14px;
      height:52px;background:var(--highlight);z-index:-1;       /* ← yellow bar (cover only) */
    }
    .cover-series .term-zh{
      font-family:var(--sans-zh);font-weight:600;font-size:32px;
      color:var(--accent);letter-spacing:.02em;margin:0;        /* IKB sub-line */
    }
    .cover-series .term-question{
      font-family:var(--serif-zh);font-weight:500;font-size:44px;line-height:1.45;
      color:var(--ink);margin:0;max-width:880px;
    }

    /* ---------- 11. Image containers (used by all content pages) ---------- */
    .illust-frame{
      width:100%;background:var(--paper);
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;margin:0;
    }
    .illust-frame img{width:100%;height:100%;object-fit:contain;display:block;}
    .frame-img{position:relative;overflow:hidden;background:var(--paper-deep);}
    .frame-img img{width:100%;height:100%;object-fit:cover;display:block;}

    .plate-caption{
      font-family:var(--mono);font-size:18px;letter-spacing:.14em;
      text-transform:uppercase;color:var(--accent);              /* IKB caption */
      margin:14px 0 0;
    }
  </style>
</head>
<body>
  <main class="sheet">

    <!-- =====================================================
         HOW TO USE THIS SEED

         1. The cover (S00) below is the ONE fixed layout in the system.
            Replace the placeholders with real content but keep the
            structure intact.

         2. For content pages (page 2 onwards), DO NOT copy this cover
            structure. Read references/layouts.md for design principles,
            then compose each page fresh from these primitives:
              - .poster.xhs            board
              - .content               flex column inside the board
              - .chrome + .foot        top/bottom IKB hairline bars
              - .section-label         per-page IKB section tag
              - .h-display-zh / .h-section-zh / .lead / .body
              - .illust-frame          for AI-generated illustrations
              - .frame-img             for photographic evidence
              - .hr-accent / .hr-hairline
              - whatever task-scoped CSS the content needs

         3. Color rules (HARD):
              - IKB blue MUST be visible on every page (chrome, foot,
                section label, dividers, page numbers, body strong, etc.)
              - Mustard yellow appears ONLY on the cover bar. Never on
                content pages.

         4. Illustration rule (HARD):
              - Most content pages should pair text + illustration.
              - Text leads; illustration explains.
              - Use .illust-frame with task-scoped height (typically
                360-560px), not one giant centerpiece per set.
     ===================================================== -->

    <!-- ============================================================
         S00 Series Cover — fixed layout (replace placeholders only)
         ============================================================ -->
    <section class="poster xhs cover-series" id="xhs-01-cover">
      <div class="content" style="gap:36px;">
        <div class="chrome">
          <span class="c-cat">AI Knowledge · Beginner Series</span>
          <span class="c-num">Day 0X</span>
        </div>
        <p class="section-label">Indigo Porcelain</p>
        <h1 class="series-zh">每天吃透一个<br><span class="ai-accent">AI</span> 知识点</h1>
        <hr class="hr-hairline">
        <div style="display:flex;flex-direction:column;gap:24px;">
          <p class="term-en">TERM</p>
          <p class="term-zh">中文小标题</p>
        </div>
        <p class="term-question">一个具体的用户场景问题,引出本日主题。</p>
        <div class="grow"></div>
        <div class="foot">
          <span class="f-tag">TERM · 一句标语</span>
          <span class="f-num">AI Native · 00X</span>
        </div>
      </div>
    </section>

  </main>
</body>
</html>
